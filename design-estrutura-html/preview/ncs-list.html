<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<title>NC Control — Lista de NCs</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="app-shell" id="root"></div>
<script src="mock-data.js"></script>
<script src="chrome.js"></script>
<script>
const root = document.getElementById('root');
const rows = NC_MOCK.ncs.map(n => `
  <tr>
    <td class="num">${n.num}</td>
    <td>
      <div style="font-weight:500;color:var(--nc-ink);margin-bottom:2px">${n.title}</div>
      <div class="mono" style="font-size:10.5px;color:var(--nc-ink-3)">
        ${n.line} · ${n.sector} · Aberta por ${NCUI.userById(n.openedBy).name} em ${n.opened}
      </div>
    </td>
    <td>${NCUI.sevBadge(n.sev, true)}</td>
    <td>${NCUI.statusBadge(n.status, true)}</td>
    <td>${NCUI.assignedChip(n.assigned)}</td>
    <td class="muted mono" style="font-size:11.5px">${n.overdue ? `<span style="color:var(--nc-critical);font-weight:600">${n.age}</span>` : n.age}</td>
    <td class="right">${n.overdue ? NCUI.overdueBadge() : `<a href="nc-detalhe.html" style="color:var(--nc-ink-2);font-size:11.5px">Abrir →</a>`}</td>
  </tr>
`).join('');

const pills = ['Todas', 'Abertas (47)', 'Em tratamento (22)', 'Aguard. verif. (8)', 'Encerradas (68)', 'Canceladas (3)'];
const filterPills = pills.map((p, i) => `
  <button class="btn ${i === 0 ? 'btn--primary' : 'btn--secondary'} btn--xs" style="border-radius:2px">${p}</button>
`).join('');

const actions = `
  <div style="display:flex;gap:8px;align-items:center">
    <button class="btn btn--secondary btn--sm">${NCUI.icon('download', 12)} Exportar CSV</button>
    <a href="nc-nova.html" class="btn btn--accent btn--sm">${NCUI.icon('plus', 12)} Nova NC</a>
  </div>
`;

root.innerHTML = `
  ${renderSidebar('ncs')}
  <div class="app-main">
    ${renderTopbar({ title: 'Não Conformidades', crumbs: ['NCs', 'Todas'], actions })}
    <div class="app-body">
      <!-- Search + filters row -->
      <div class="panel" style="padding:14px 18px;margin-bottom:12px">
        <div style="display:flex;gap:12px;align-items:center">
          <div class="input-ico" style="position:relative;flex:1;max-width:380px">
            <svg style="position:absolute;left:12px;top:11px" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--nc-muted)" stroke-width="1.75"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input class="input" placeholder="Buscar por número ou título (ex: NC-2026, torque...)" style="padding-left:36px"/>
          </div>
          <div style="display:flex;gap:8px">
            <select class="select" style="width:140px">
              <option>Todas gravidades</option><option>Crítica</option><option>Alta</option><option>Média</option><option>Baixa</option>
            </select>
            <select class="select" style="width:140px">
              <option>Todos tipos</option><option>Produto</option><option>Processo</option><option>Material</option><option>Segurança</option><option>Outro</option>
            </select>
            <select class="select" style="width:140px">
              <option>Todas linhas</option><option>Linha 01</option><option>Linha 02</option><option>Linha 03</option><option>SMT</option>
            </select>
            <button class="btn btn--secondary btn--sm">${NCUI.icon('filter', 12)} Mais filtros</button>
          </div>
        </div>
        <div style="display:flex;gap:6px;margin-top:12px;flex-wrap:wrap">${filterPills}</div>
      </div>

      <div class="panel">
        <div class="panel__head">
          <div>
            <div class="panel__title">Resultados</div>
            <div class="panel__sub">148 NCs · página 1 de 15</div>
          </div>
          <div class="mono" style="font-size:10px;color:var(--nc-ink-3);letter-spacing:0.5px">ordenar: Abertura ↓</div>
        </div>
        <table class="tbl">
          <thead><tr>
            <th>Número</th><th>Título</th><th>Grav.</th><th>Status</th><th>Responsável</th><th>Aberta há</th><th class="right"></th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
        <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 18px;border-top:1px solid var(--nc-line)">
          <div class="mono" style="font-size:11px;color:var(--nc-ink-3)">Mostrando 1–10 de 148</div>
          <div style="display:flex;gap:6px">
            <button class="btn btn--secondary btn--xs">${NCUI.icon('arrowLeft', 11)}</button>
            <button class="btn btn--primary btn--xs">1</button>
            <button class="btn btn--secondary btn--xs">2</button>
            <button class="btn btn--secondary btn--xs">3</button>
            <span class="mono" style="padding:0 4px;font-size:11px;color:var(--nc-muted)">…</span>
            <button class="btn btn--secondary btn--xs">15</button>
            <button class="btn btn--secondary btn--xs">${NCUI.icon('arrowRight', 11)}</button>
          </div>
        </div>
      </div>
    </div>
  </div>
`;
</script>
</body>
</html>
