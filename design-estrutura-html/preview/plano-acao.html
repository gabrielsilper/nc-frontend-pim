<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<title>NC Control — Plano de Ação</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="app-shell" id="root"></div>
<script src="mock-data.js"></script>
<script src="chrome.js"></script>
<script>
const root = document.getElementById('root');

const allActions = [
  { id: 'CA-2026-048', nc: 'NC-2026-0213', desc: 'Recalibrar forno de refusão (zona 3)', resp: 'u02', deadline: '26/04 18:00', status: 'EM_ANDAMENTO' },
  { id: 'CA-2026-047', nc: 'NC-2026-0212', desc: 'Substituir bobina de etiqueta na impressora L07', resp: 'u03', deadline: '24/04 16:00', status: 'EM_ANDAMENTO', overdue: false },
  { id: 'CA-2026-046', nc: 'NC-2026-0212', desc: 'Revisar checklist diário de manutenção preventiva', resp: 'u03', deadline: '23/04 18:00', status: 'PENDENTE', overdue: true },
  { id: 'CA-2026-045', nc: 'NC-2026-0213', desc: 'Retrabalhar 42 placas do lote #88213', resp: 'u03', deadline: '25/04 12:00', status: 'PENDENTE' },
  { id: 'CA-2026-044', nc: 'NC-2026-0211', desc: 'Recalibrar bancada de inspeção posto 14 (ISO 17025)', resp: 'u02', deadline: '28/04 12:00', status: 'EM_ANDAMENTO' },
  { id: 'CA-2026-043', nc: 'NC-2026-0209', desc: 'Reorganizar área de armazenamento de pallets da Linha 02', resp: 'u02', deadline: '26/04 12:00', status: 'CONCLUIDA' },
  { id: 'CA-2026-042', nc: 'NC-2026-0213', desc: 'Inspecionar amostra de 20 placas do próximo lote', resp: 'u02', deadline: '25/04 16:00', status: 'CONCLUIDA' },
  { id: 'CA-2026-041', nc: 'NC-2026-0211', desc: 'Treinamento de 1h com inspetores sobre rotina de verificação', resp: 'u02', deadline: '27/04 14:00', status: 'PENDENTE' },
];

const cols = {
  PENDENTE:     { title: 'Pendente',     items: allActions.filter(a => a.status === 'PENDENTE') },
  EM_ANDAMENTO: { title: 'Em andamento', items: allActions.filter(a => a.status === 'EM_ANDAMENTO') },
  CONCLUIDA:    { title: 'Concluída',    items: allActions.filter(a => a.status === 'CONCLUIDA') },
};

function actionCard(a) {
  const u = NCUI.userById(a.resp);
  return `
    <div class="panel" style="padding:12px 14px;${a.overdue ? 'border-left:3px solid var(--nc-critical);' : ''}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:8px">
        <div class="mono" style="font-size:10.5px;color:var(--nc-ink-3);letter-spacing:0.4px">${a.id}</div>
        <a class="mono" style="font-size:10.5px;color:var(--nc-ink-2);text-decoration:underline" href="nc-detalhe.html">${a.nc}</a>
      </div>
      <div style="font-size:13px;color:var(--nc-ink);line-height:1.45;margin-bottom:12px">${a.desc}</div>
      <div style="display:flex;justify-content:space-between;align-items:center;padding-top:10px;border-top:1px solid var(--nc-line)">
        <div style="display:flex;align-items:center;gap:6px">
          <div style="width:22px;height:22px;background:#334155;color:#fff;display:grid;place-items:center;font-family:'JetBrains Mono',monospace;font-size:9.5px;font-weight:600;border-radius:2px">${u.initials}</div>
          <span style="font-size:11.5px;color:var(--nc-ink-2)">${u.name.split(' ')[0]}</span>
        </div>
        <div class="mono" style="font-size:10.5px;color:${a.overdue ? 'var(--nc-critical)' : 'var(--nc-ink-3)'};font-weight:${a.overdue ? '700' : '400'};display:flex;align-items:center;gap:4px">
          ${NCUI.icon('clock', 11, a.overdue ? 'var(--nc-critical)' : 'var(--nc-muted)')}
          ${a.deadline}
        </div>
      </div>
    </div>
  `;
}

const columns = Object.entries(cols).map(([key, col]) => {
  const dotColor = { PENDENTE: 'var(--nc-low)', EM_ANDAMENTO: 'var(--nc-accent)', CONCLUIDA: 'var(--nc-ok)' }[key];
  return `
    <div style="display:flex;flex-direction:column;gap:10px;min-width:0">
      <div style="display:flex;justify-content:space-between;align-items:center;padding:0 2px">
        <div style="display:flex;align-items:center;gap:8px">
          <span style="width:8px;height:8px;background:${dotColor};border-radius:50%"></span>
          <span class="mono" style="font-size:11px;color:var(--nc-ink);font-weight:600;letter-spacing:0.5px;text-transform:uppercase">${col.title}</span>
          <span class="mono" style="font-size:10.5px;color:var(--nc-muted)">${col.items.length}</span>
        </div>
        <button class="btn btn--ghost btn--xs">${NCUI.icon('plus', 11)}</button>
      </div>
      <div style="display:flex;flex-direction:column;gap:10px">${col.items.map(actionCard).join('')}</div>
    </div>
  `;
}).join('');

const actions = `
  <div style="display:flex;gap:8px;align-items:center">
    <select class="select" style="width:180px;padding:6px 10px;font-size:12px">
      <option>Todas as NCs</option><option>Minhas NCs</option><option>NC-2026-0213</option>
    </select>
    <button class="btn btn--secondary btn--sm">${NCUI.icon('filter', 12)} Filtros</button>
    <button class="btn btn--accent btn--sm">${NCUI.icon('plus', 12)} Nova ação</button>
  </div>
`;

root.innerHTML = `
  ${renderSidebar('acoes')}
  <div class="app-main">
    ${renderTopbar({ title: 'Plano de ação — consolidado', crumbs: ['Ações'], actions })}
    <div class="app-body">
      <div class="panel" style="padding:14px 18px;margin-bottom:14px;display:flex;gap:28px;align-items:center">
        <div>
          <div class="mono" style="font-size:10px;color:var(--nc-muted);letter-spacing:0.6px;text-transform:uppercase;margin-bottom:4px">Total ativo</div>
          <div style="display:flex;align-items:baseline;gap:6px"><span class="mono" style="font-size:22px;font-weight:600">17</span><span style="font-size:12px;color:var(--nc-ink-3)">ações</span></div>
        </div>
        <div style="width:1px;height:36px;background:var(--nc-line)"></div>
        <div>
          <div class="mono" style="font-size:10px;color:var(--nc-muted);letter-spacing:0.6px;text-transform:uppercase;margin-bottom:4px">Vencidas</div>
          <div class="mono" style="font-size:22px;font-weight:600;color:var(--nc-critical)">3</div>
        </div>
        <div style="width:1px;height:36px;background:var(--nc-line)"></div>
        <div>
          <div class="mono" style="font-size:10px;color:var(--nc-muted);letter-spacing:0.6px;text-transform:uppercase;margin-bottom:4px">Concluídas (abr)</div>
          <div class="mono" style="font-size:22px;font-weight:600;color:var(--nc-ok)">52</div>
        </div>
        <div style="width:1px;height:36px;background:var(--nc-line)"></div>
        <div style="flex:1">
          <div class="mono" style="font-size:10px;color:var(--nc-muted);letter-spacing:0.6px;text-transform:uppercase;margin-bottom:4px">Taxa de conclusão no prazo</div>
          <div style="display:flex;align-items:center;gap:10px">
            <div style="flex:1;height:6px;background:#F1F5F9;max-width:240px">
              <div style="height:100%;width:86%;background:var(--nc-ok)"></div>
            </div>
            <span class="mono" style="font-size:13px;font-weight:600">86%</span>
          </div>
        </div>
      </div>

      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px">${columns}</div>
    </div>
  </div>
`;
</script>
</body>
</html>
