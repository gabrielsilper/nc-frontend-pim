<aside class="w-[220px] flex-shrink-0 bg-nc-bg text-white flex flex-col h-full">
  <div class="px-5 py-5 border-b border-white/10">
    <div class="flex items-center gap-2.5">
      <div
        class="w-9 h-9 bg-nc-accent flex items-center justify-center font-mono text-[13px] font-bold text-white rounded-sm"
      >
        NC
      </div>
      <div class="leading-tight">
        <div class="text-sm font-semibold">NC Control</div>
        <div class="font-mono text-[9.5px] text-white/50 uppercase tracking-wider mt-0.5">
          Gestão de Não Conformidades
        </div>
      </div>
    </div>
  </div>

  <nav class="flex-1 overflow-auto py-3">
    <a
      routerLink="/app/dashboard"
      routerLinkActive="bg-white/5 text-white border-l-nc-accent"
      [routerLinkActiveOptions]="{ exact: false }"
      class="flex items-center gap-2.5 px-5 py-2.5 text-[13px] text-white/70 border-l-[3px] border-l-transparent hover:bg-white/5 hover:text-white transition-colors"
    >
      <span class="material-symbols-outlined">dashboard</span>
      Dashboard
    </a>
  </nav>

  <div class="px-4 py-3 border-t border-white/10">
    <div class="flex items-center gap-2.5">
      <div
        class="w-8 h-8 bg-nc-accent flex items-center justify-center font-mono text-[11px] font-semibold text-white rounded-sm flex-shrink-0"
      >
        {{ initials() }}
      </div>
      <div class="flex-1 min-w-0 leading-tight">
        <div class="text-[12.5px] font-medium truncate">{{ user()?.name ?? '—' }}</div>
        <div class="font-mono text-[9.5px] text-white/50 uppercase tracking-wider mt-0.5">
          {{ profileLabel() }}
        </div>
      </div>
      <button
        type="button"
        (click)="logout()"
        title="Sair"
        class="w-7 h-7 flex items-center justify-center text-white/50 hover:text-white hover:bg-white/10 rounded-sm transition-colors"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="14"
          height="14"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
          <polyline points="16 17 21 12 16 7" />
          <line x1="21" y1="12" x2="9" y2="12" />
        </svg>
      </button>
    </div>
  </div>
</aside>
